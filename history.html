<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>City History</title>

<style>

:root{
--main:#00ffff;
--accent:#ff00ff;
}

body{

background:black;
color:white;

font-family:-apple-system, BlinkMacSystemFont, sans-serif;

padding:10px 20px;

}

.header{

position:relative;

display:flex;
align-items:center;
justify-content:center;

height:150px;

margin-bottom:20px;

}

h1{

text-align:center;
margin:0;
font-size:35px;

}

.card{

border:2px solid #00ffff;
border-radius:12px;

padding:16px;

margin-bottom:20px;

background:rgba(0,0,0,0.6);

box-shadow:
0 0 10px #00ffff,
0 0 20px rgba(0,0,0,0.8);

line-height:1.6;

}

.card::before{

content:"";

display:block;

height:2px;

background:linear-gradient(
90deg,
transparent,
var(--main),
var(--accent),
var(--main),
transparent
);

margin-bottom:10px;

}

.card-grid{

display:flex;
justify-content:space-between;

gap:20px;

}

.card-col{
width:48%;
padding-left:12px;
font-size:30px;
line-height:1.6;
}

.card-col b{
color:var(--accent);
}

.mode{

color:var(--accent);

font-weight:bold;

margin-bottom:6px;

}

.time{

font-size:12px;

opacity:0.7;

margin-top:6px;

}

button{

margin-top:20px;

padding:8px 14px;

}

.back-button{

position:absolute;

left:20px;
top:50%;
transform:translateY(-50%);

width:300px;
height:80px;

font-size:25px;

display:flex;
justify-content:center;
align-items:center;

background:black;
color:var(--main);

border:2px solid var(--main);
border-radius:10px;

box-shadow:0 0 6px var(--main);

z-index:1000;

}

.back-button:hover{
box-shadow:0 0 12px var(--main);
}

/* モード別アクセントカラー */

.mode-cyberpunk{
--accent:#00ffff;
}

.mode-apocalypse{
--accent:#ff6600;
}

.mode-synthwave{
--accent:#ff66ff;
}

.mode-noir{
--accent:#aaaaaa;
}

.card:active{

box-shadow:
0 0 20px var(--main),
0 0 40px rgba(0,255,255,0.4);

transform:scale(0.99);

}

#historyContainer{

max-width:800px;

margin-left:auto;
margin-right:auto;

}

</style>

</head>

<body>

<div class="header">

<button class="back-button" onclick="window.history.back()">戻る</button>

<h1>生成履歴</h1>

</div>

<div id="historyContainer"></div>

<script>
function formatMode(mode){

if(mode === "cyberpunk") return "Cyberpunk";
if(mode === "apocalypse") return "Post-Apocalypse";
if(mode === "synthwave") return "Synthwave";
if(mode === "noir") return "Noir";

return mode;

}
  
window.addEventListener("load", function(){

const history = JSON.parse(localStorage.getItem("cityHistory") || "[]");

const container = document.getElementById("historyContainer");

if(history.length === 0){

container.textContent="履歴はまだありません。";

return;

}

history.forEach((item,index)=>{

const card=document.createElement("div");

card.className="card mode-" + item.mode;

card.innerHTML=`

<div class="mode">${formatMode(item.mode)} City</div>

<div class="card-grid">

<div class="card-col">
<b>建築</b>：${item.architecture}<br>
<b>環境</b>：${item.environment}<br>
<b>社会</b>：${item.society}<br>
<b>雰囲気</b>：${item.mood}<br>
<b>地区</b>：${item.district}
</div>

<div class="card-col">
<b>施設</b>：${item.facility}<br>
<b>職業</b>：${item.job}<br>
<b>人物</b>：${item.character}<br>
<b>事件</b>：${item.incident}
</div>

</div>

<div class="time">${item.time}</div>

`;

container.appendChild(card);

});

});

</script>

</body>

</html>
