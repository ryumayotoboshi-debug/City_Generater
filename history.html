<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>History</title>
    
<style>
body{
font-family: sans-serif;
background:#000;
color:#fff;
padding:20px;
}

button{
margin-top:20px;
padding:8px 16px;
}
</style>
    
</head>
<body>
<h1>生成履歴</h1>
<div id="historyContainer"></div>
<button onclick="window.history.back()">戻る</button>

<script>
window.addEventListener("load", function() {
    let history = JSON.parse(localStorage.getItem("cityHistory") || "[]");
    const container = document.getElementById("historyContainer");

    if(history.length === 0){
        container.textContent = "履歴はまだありません。";
        return;
    }

    history.forEach((item, index) => {

    const div = document.createElement("div");

    div.innerHTML = `
    <b>${index + 1}. ${item.mode}</b><br>
    建築: ${item.architecture}<br>
    環境: ${item.environment}<br>
    社会: ${item.society}<br>
    雰囲気: ${item.mood}<br>
    地区: ${item.district}<br>
    施設: ${item.facility}<br>
    職業: ${item.job}<br>
    人物: ${item.character}<br>
    事件: ${item.incident}<br>
    <small>${item.time}</small>
    `;

    div.style.marginBottom = "16px";
    div.style.borderBottom = "1px solid #888";
    div.style.paddingBottom = "8px";

    container.appendChild(div);
});
</script>
</body>
</html>
