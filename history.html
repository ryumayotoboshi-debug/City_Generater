<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>City History</title>

<style>

:root{
--main:#00ffff;
--accent:#ff00ff;
}

body{

background:black;
color:white;

font-family:-apple-system, BlinkMacSystemFont, sans-serif;

padding:20px;

}

.header{

position:relative;

display:flex;
align-items:center;
justify-content:center;

height:100px;

margin-bottom:20px;

}

h1{

text-align:center;

margin:0;

}

.card{

border:2px solid #00ffff;
border-radius:12px;

padding:16px;

margin-bottom:20px;

background:rgba(0,0,0,0.6);

box-shadow:
0 0 10px #00ffff,
0 0 20px rgba(0,0,0,0.8);

line-height:1.6;

}

.mode{

color:#ff00ff;

font-weight:bold;

margin-bottom:6px;

}

.time{

font-size:12px;

opacity:0.7;

margin-top:6px;

}

button{

margin-top:20px;

padding:8px 14px;

}

.back-button{

position:absolute;

left:20px;
top:50%;
transform:translateY(-50%);

width:200px;
height:60px;

font-size:18px;

display:flex;
justify-content:center;
align-items:center;

background:black;
color:var(--main);

border:2px solid var(--main);
border-radius:10px;

box-shadow:0 0 6px var(--main);

z-index:1000;

}

.back-button:hover{
box-shadow:0 0 12px var(--main);
}

</style>

</head>

<body>

<div class="header">

<button class="back-button" onclick="window.history.back()">戻る</button>

<h1>生成履歴</h1>

</div>

<div id="historyContainer"></div>

<script>
function formatMode(mode){

if(mode === "cyberpunk") return "Cyberpunk";
if(mode === "apocalypse") return "Post-Apocalypse";
if(mode === "synthwave") return "Synthwave";
if(mode === "noir") return "Noir";

return mode;

}
  
window.addEventListener("load", function(){

const history = JSON.parse(localStorage.getItem("cityHistory") || "[]");

const container = document.getElementById("historyContainer");

if(history.length === 0){

container.textContent="履歴はまだありません。";

return;

}

history.forEach((item,index)=>{

const card=document.createElement("div");

card.className="card";

card.innerHTML=`

<div class="mode">${formatMode(item.mode)} City</div>

建築: ${item.architecture}<br>
環境: ${item.environment}<br>
社会: ${item.society}<br>
雰囲気: ${item.mood}<br>
地区: ${item.district}<br>
施設: ${item.facility}<br>
職業: ${item.job}<br>
人物: ${item.character}<br>
事件: ${item.incident}

<div class="time">${item.time}</div>

`;

container.appendChild(card);

});

});

</script>

</body>

</html>
