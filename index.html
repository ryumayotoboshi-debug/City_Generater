<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<meta name="theme-color" content="#000000">

<link rel="apple-touch-icon" href="IMG_4351.jpeg">

<link rel="manifest" href="manifest.json">

<title>City Generator</title>

<style>

body {
margin: 0;
font-family: -apple-system, BlinkMacSystemFont, sans-serif;
background: #000;
color: white;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
text-align: center;
}

/* アプリの内容 */

.container {
display: flex;
flex-direction: column;
gap: 20px;
align-items: center;
}

/* タイトル */

h1 {
font-size: 32px;
margin: 0;
}

/* ボタン */

button {
font-size: 20px;
padding: 12px 24px;
border-radius: 12px;
border: none;
background: #2c2c2c;
color: white;
}

/* Loading画面 */

#loading {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
background: black;
color: white;
font-size: 24px;
z-index: 9999;
}

</style>

</head>

<body>

<div id="loading">Loading...</div>

<div class="container">

<h1>都市ジェネレーター</h1>

<button onclick="generateCity()">生成</button>

<p id="result"></p>

</div>

<script>

function generateCity() {

const cities = [
"地下都市",
"水上都市",
"浮遊都市",
"迷路都市",
"廃墟都市",
"工業都市",
"研究都市",
"港湾都市"
];

const random = cities[Math.floor(Math.random() * cities.length)];

document.getElementById("result").textContent = random;

}

/* Loading消す */

window.addEventListener("load", function() {
document.getElementById("loading").style.display = "none";
});

/* Service Worker */

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>

</html>
