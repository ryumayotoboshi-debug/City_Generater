<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>City Generator</title>

<style>
:root {
  --main: #00ffff;
  --accent: #ff00ff;
}

body {
  margin: 0;
  background: #020202;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px 0;
  height: 100vh;
  overflow: hidden;
  text-align: center;
}

.container {
  max-width: 420px;
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

h1 {
  font-size: 54px;
  color: var(--main);
  text-shadow: 0 0 10px var(--main), 0 0 20px var(--main), 0 0 40px var(--main);
  margin-bottom: 20px;
}

/* ===== コントロール ===== */
.controls {
  display: flex;
  justify-content: center;
  align-items: stretch;
  gap: 20px;
  margin-bottom: 20px;
}

#generateBtn {
  font-size: 18px;
  padding: 12px 0;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.rightColumn {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: stretch;
}

button, select {
  font-size: 14px;
  padding: 8px 16px;
  background: black;
  color: var(--main);
  border: 2px solid var(--main);
  border-radius: 10px;
  box-shadow: 0 0 6px var(--main);
  text-align: center;
  cursor: pointer;
}

.rightColumn button, .rightColumn select {
  width: 120px;
}

#generateBtn {
  width: 140px;
}

/* ===== 出力要素 ===== */
.block {
  margin-bottom: 6px;
  width: 100%;
}

.category {
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--accent);
}

.output {
  font-size: 17px;
  text-shadow: 0 0 6px var(--main);
}

#loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: black;
  color: var(--main);
  font-size: 24px;
  z-index: 9999;
}
</style>
</head>

<body>
<div id="loading">Loading...</div>

<div class="container">

<h1>City Generator</h1>

<div class="controls">
  <button id="generateBtn" onclick="generateCity()">Generate</button>
  <div class="rightColumn">
    <select id="mode" onchange="changeTheme()">
      <option value="cyberpunk">Cyberpunk</option>
      <option value="apocalypse">Post-Apocalypse</option>
      <option value="synthwave">Synthwave</option>
      <option value="noir">Noir</option>
    </select>
    <button onclick="openHistory()">History</button>
  </div>
</div>

<div class="block"><div class="category">建築</div><div class="output" id="architecture"></div></div>
<div class="block"><div class="category">環境</div><div class="output" id="environment"></div></div>
<div class="block"><div class="category">社会</div><div class="output" id="society"></div></div>
<div class="block"><div class="category">雰囲気</div><div class="output" id="mood"></div></div>
<div class="block"><div class="category">地区</div><div class="output" id="district"></div></div>
<div class="block"><div class="category">施設</div><div class="output" id="facility"></div></div>
<div class="block"><div class="category">職業</div><div class="output" id="job"></div></div>
<div class="block"><div class="category">主要人物</div><div class="output" id="character"></div></div>
<div class="block"><div class="category">事件</div><div class="output" id="event"></div></div>

</div>
