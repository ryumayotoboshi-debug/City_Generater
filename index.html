<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>City_Generator</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<meta name="theme-color" content="#000000">

<link rel="apple-touch-icon" href="IMG_4351.jpeg">
  
<style>
body{
font-family:sans-serif;
text-align:center;
background:#111;
color:#eee;
}

button{
padding:10px 20px;
font-size:16px;
margin:20px;
}

.result{
margin:10px;
font-size:18px;
}
</style>
</head>

<body>

<h1>City Generator</h1>

<button onclick="generate()">Generate</button>

<div class="result">都市タイプ: <span id="type"></span></div>
<div class="result">建築: <span id="arch"></span></div>
<div class="result">環境: <span id="env"></span></div>
<div class="result">社会: <span id="soc"></span></div>
<div class="result">雰囲気: <span id="mood"></span></div>

<script>

const types=["地下都市","水上都市","浮遊都市","垂直都市","迷路都市","巨大ドーム都市","宇宙港都市","砂漠都市","雪原都市","廃墟都市","工業都市","研究都市","港湾都市","鉱山都市","森林都市","要塞都市","宗教都市","市場都市","観光都市","辺境都市"];

const arch=["ネオン広告","巨大看板","ガラス建築","コンクリート高層","レンガ街区","金属建築","古い石造","巨大パイプ","ケーブル網","ドーム建築","アーチ街路","細い路地","地下通路","屋上庭園","空中回廊","橋の街","高架道路","巨大塔","観測塔","発電施設"];

const env=["雨","霧","雪","強風","嵐","雷","曇天","夕焼け","深夜","早朝","薄暗い空","ネオンの光","街灯","人工照明","煙","工場排気","静寂","騒音","人混み","無人"];

const soc=["AI監視社会","巨大企業統治","自律自治都市","研究機関支配","軍事都市","犯罪都市","交易都市","宗教支配","貴族都市","独裁都市","自由都市","無政府区域","監視都市","警察国家","商業都市","労働都市","移民都市","難民都市","観光都市","秘密都市"];

const mood=["孤独","郷愁","静寂","退廃","不安","緊張","希望","荒廃","混沌","神秘","温かさ","冷たさ","機械的","幻想的","陰鬱","開放感","閉塞感","懐古","未来感","夢のよう"];

function pick(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generate(){

document.getElementById("type").textContent=pick(types);
document.getElementById("arch").textContent=pick(arch);
document.getElementById("env").textContent=pick(env);
document.getElementById("soc").textContent=pick(soc);
document.getElementById("mood").textContent=pick(mood);

}

</script>

</body>
</html>
