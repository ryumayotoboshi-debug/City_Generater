<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<meta name="theme-color" content="#000000">

<link rel="apple-touch-icon" href="IMG_4351.jpeg">

<title>City Generator</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
display:flex;
flex-direction:column;
gap:18px;
align-items:center;
max-width:420px;
padding:20px;
}

h1{
font-size:30px;
margin:0;
}

button{
font-size:20px;
padding:12px 24px;
border-radius:12px;
border:none;
background:#2c2c2c;
color:white;
}

.result{
font-size:18px;
line-height:1.6;
width:100%;
}

.block{
margin-top:10px;
}

.category{
opacity:0.7;
font-size:14px;
}

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:black;
color:white;
font-size:24px;
z-index:9999;
}

</style>

</head>

<body>

<div id="loading">Loading...</div>

<div class="container">

<h1>City Generator</h1>

<button onclick="generateCity()">Generate</button>

<div class="result">

<div class="block">
<div class="category">都市タイプ</div>
<div id="city"></div>
</div>

<div class="block">
<div class="category">建築</div>
<div id="architecture"></div>
</div>

<div class="block">
<div class="category">環境</div>
<div id="environment"></div>
</div>

<div class="block">
<div class="category">社会</div>
<div id="society"></div>
</div>

<div class="block">
<div class="category">雰囲気</div>
<div id="mood"></div>
</div>

</div>

</div>

<script>

const cityTypes=[
"地下都市","水上都市","浮遊都市","垂直都市","迷路都市","巨大ドーム都市","宇宙港都市","砂漠都市","雪原都市","廃墟都市",
"工業都市","研究都市","港湾都市","鉱山都市","森林都市","要塞都市","宗教都市","市場都市","観光都市","辺境都市"
];

const architectures=[
"ネオン広告","巨大看板","ガラス建築","コンクリート高層","レンガ街区","金属建築","古い石造","巨大パイプ","ケーブル網","ドーム建築",
"アーチ街路","細い路地","地下通路","屋上庭園","空中回廊","橋の街","高架道路","巨大塔","観測塔","発電施設"
];

const environments=[
"雨","霧","雪","強風","嵐","雷","曇天","夕焼け","深夜","早朝",
"薄暗い空","ネオンの光","街灯","人工照明","煙","工場排気","静寂","騒音","人混み","無人"
];

const societies=[
"AI監視社会","巨大企業統治","自律自治都市","研究機関支配","軍事都市","犯罪都市","交易都市","宗教支配","貴族都市","独裁都市",
"自由都市","無政府区域","監視都市","警察国家","商業都市","労働都市","移民都市","難民都市","観光都市","秘密都市"
];

const moods=[
"孤独","郷愁","静寂","退廃","不安","緊張","希望","荒廃","混沌","神秘",
"温かさ","冷たさ","機械的","幻想的","陰鬱","開放感","閉塞感","懐古","未来感","夢のよう"
];

function randomFrom(array){
return array[Math.floor(Math.random()*array.length)];
}

function generateCity(){

document.getElementById("city").textContent=randomFrom(cityTypes);
document.getElementById("architecture").textContent=randomFrom(architectures);
document.getElementById("environment").textContent=randomFrom(environments);
document.getElementById("society").textContent=randomFrom(societies);
document.getElementById("mood").textContent=randomFrom(moods);

}

window.addEventListener("load",function(){

document.getElementById("loading").style.display="none";

generateCity();

});

</script>

</body>

</html>
