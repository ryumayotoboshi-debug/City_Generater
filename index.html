<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">

<link rel="apple-touch-icon" href="IMG_4351.jpeg">

<title>City Generator</title>

<style>

body{
margin:0;
background:#020202;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
display:flex;
flex-direction:column;
gap:22px;
align-items:center;
max-width:420px;
padding:20px;
}

h1{
font-size:34px;
color:#00ffff;
text-shadow:
0 0 8px #00ffff,
0 0 16px #00ffff,
0 0 32px #00ffff,
0 0 64px #00ffff;
}

button{
font-size:20px;
padding:12px 28px;
background:#000;
color:#00ffff;
border:2px solid #00ffff;
border-radius:14px;
box-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff,
0 0 40px #00ffff;
}

button:active{
box-shadow:
0 0 6px #00ffff,
0 0 12px #00ffff;
}

.result{
font-size:18px;
line-height:1.7;
width:100%;
}

.block{
margin-top:10px;
}

.category{
font-size:13px;
color:#ff00ff;
text-shadow:
0 0 6px #ff00ff,
0 0 14px #ff00ff;
letter-spacing:1px;
}

.output{
font-size:20px;
margin-top:4px;
color:#ffffff;
text-shadow:
0 0 5px #ffffff,
0 0 12px #00ffff,
0 0 18px #00ffff;
}

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:#000;
color:#00ffff;
font-size:26px;
text-shadow:
0 0 12px #00ffff,
0 0 28px #00ffff;
z-index:9999;
}

</style>

</head>

<body>

<div id="loading">Loading...</div>

<div class="container">

<h1>City Generator</h1>

<button onclick="generateCity()">Generate</button>

<div class="result">

<div class="block">
<div class="category">都市タイプ</div>
<div class="output" id="city"></div>
</div>

<div class="block">
<div class="category">建築</div>
<div class="output" id="architecture"></div>
</div>

<div class="block">
<div class="category">環境</div>
<div class="output" id="environment"></div>
</div>

<div class="block">
<div class="category">社会</div>
<div class="output" id="society"></div>
</div>

<div class="block">
<div class="category">雰囲気</div>
<div class="output" id="mood"></div>
</div>

<div class="block">
<div class="category">地区</div>
<div class="output" id="district"></div>
</div>

<div class="block">
<div class="category">施設</div>
<div class="output" id="location"></div>
</div>

</div>

</div>

<script>

/* 都市タイプ */

const cityTypes=[
"地下都市","水上都市","浮遊都市","垂直都市","迷路都市","巨大ドーム都市","宇宙港都市","砂漠都市","雪原都市","廃墟都市",
"工業都市","研究都市","港湾都市","鉱山都市","森林都市","要塞都市","宗教都市","市場都市","観光都市","辺境都市"
];

/* 建築 */

const architectures=[
"ネオン広告","巨大看板","ガラス建築","コンクリート高層","レンガ街区","金属建築","古い石造","巨大パイプ","ケーブル網","ドーム建築",
"アーチ街路","細い路地","地下通路","屋上庭園","空中回廊","橋の街","高架道路","巨大塔","観測塔","発電施設"
];

/* 環境 */

const environments=[
"雨","霧","雪","強風","嵐","雷","曇天","夕焼け","深夜","早朝",
"薄暗い空","ネオンの光","街灯","人工照明","煙","工場排気","静寂","騒音","人混み","無人"
];

/* 社会 */

const societies=[
"AI監視社会","巨大企業統治","自律自治都市","研究機関支配","軍事都市","犯罪都市","交易都市","宗教支配","貴族都市","独裁都市",
"自由都市","無政府区域","監視都市","警察国家","商業都市","労働都市","移民都市","難民都市","観光都市","秘密都市"
];

/* 雰囲気 */

const moods=[
"孤独","郷愁","静寂","退廃","不安","緊張","希望","荒廃","混沌","神秘",
"温かさ","冷たさ","機械的","幻想的","陰鬱","開放感","閉塞感","懐古","未来感","夢のよう"
];

/* 地区 */

const districts=[
"ネオン歓楽街","工業区","港湾地区","下層スラム","高級住宅街","研究区","宗教区","廃墟地区","地下マーケット","屋上農業区",
"旧市街","倉庫街","軍事区","市場街","娯楽地区","観光区","行政区","居住区","企業本社街","データセンター街"
];

/* 施設 */

const locations=[
"夜だけ開く市場","違法サイバー改造クリニック","ネオンバー","AI修理店","屋上温室","密輸ドック","旧地下鉄駅","廃研究所",
"巨大データセンター","ドローン発着場","秘密クラブ","宗教神殿","地下闘技場","古い図書館","発電施設","水処理施設",
"観測塔","空中駅","巨大ショッピングモール","路地裏の食堂"
];

/* ランダム取得 */

function randomFrom(array){
return array[Math.floor(Math.random()*array.length)];
}

/* 生成 */

function generateCity(){

document.getElementById("city").textContent=randomFrom(cityTypes);

document.getElementById("architecture").textContent=randomFrom(architectures);

document.getElementById("environment").textContent=randomFrom(environments);

document.getElementById("society").textContent=randomFrom(societies);

document.getElementById("mood").textContent=randomFrom(moods);

document.getElementById("district").textContent=randomFrom(districts);

document.getElementById("location").textContent=randomFrom(locations);

}

/* 初期処理 */

window.addEventListener("load",function(){

document.getElementById("loading").style.display="none";

generateCity();

});

</script>

</body>

</html>
