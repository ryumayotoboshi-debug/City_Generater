function saveHistory(city){

let history = JSON.parse(localStorage.getItem("cityHistory") || "[]");

history.unshift(city); // 新しいものを先頭に追加

if(history.length > 50){
history.pop(); // 50件以上なら古いもの削除
}

localStorage.setItem("cityHistory", JSON.stringify(history));

}



function generateCity(){

const architecture = document.getElementById("architecture")
const environment = document.getElementById("environment")
const society = document.getElementById("society")
const mood = document.getElementById("mood")
const district = document.getElementById("district")
const facility = document.getElementById("facility")
const job = document.getElementById("job")
const character = document.getElementById("character")
const incident = document.getElementById("incident")

const d = data[currentMode];

if(!d){
console.error("モードデータが見つかりません:", currentMode);
return;
}

architecture.textContent=random(d.architecture)
environment.textContent=random(d.environment)
society.textContent=random(d.society)
mood.textContent=random(d.mood)
district.textContent=random(d.district)
facility.textContent=random(d.facility)
job.textContent = d.jobs ? random(d.jobs) : "";
character.textContent=random(d.characters)
incident.textContent=random(d.incidents)

const city = {

architecture: architecture.textContent,
environment: environment.textContent,
society: society.textContent,
mood: mood.textContent,
district: district.textContent,
facility: facility.textContent,
job: job.textContent,
character: character.textContent,
incident: incident.textContent,

mode: currentMode,
time: new Date().toLocaleString()

}

saveHistory(city);

}

function loadSelectedCity(){

const data = localStorage.getItem("selectedCity");

if(!data) return;

const city = JSON.parse(data);

document.getElementById("architecture").textContent = city.architecture;
document.getElementById("environment").textContent = city.environment;
document.getElementById("society").textContent = city.society;
document.getElementById("mood").textContent = city.mood;
document.getElementById("district").textContent = city.district;
document.getElementById("facility").textContent = city.facility;
document.getElementById("job").textContent = city.job;
document.getElementById("character").textContent = city.character;
document.getElementById("incident").textContent = city.incident;

localStorage.removeItem("selectedCity");

}

function changeTheme(){

if(currentMode==="cyberpunk"){
document.documentElement.style.setProperty("--main","#00ffff")
document.documentElement.style.setProperty("--accent","#ff00ff")
}

if(currentMode==="apocalypse"){
document.documentElement.style.setProperty("--main","#ffffff")
document.documentElement.style.setProperty("--accent","#8aff00")
}

if(currentMode==="synthwave"){
document.documentElement.style.setProperty("--main","#ff71ce")
document.documentElement.style.setProperty("--accent","#01cdfe")
}

if(currentMode==="noir"){
document.documentElement.style.setProperty("--main","#dddddd")
document.documentElement.style.setProperty("--accent","#888888")
}

}

generateCity()
loadSelectedCity()
